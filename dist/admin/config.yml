backend:
  name: git-gateway
  branch: main

locale: fr

media_folder: "public/uploads"
public_folder: "/uploads"

collections:

  # ══════════════════════════════════════════════════
  # TARIFS — un fichier JSON par catégorie
  # ══════════════════════════════════════════════════
  - name: tarifs
    label: "Tarifs & Prix"
    files:

      - name: coiffure
        label: "Coiffure / Coupe"
        file: "src/content/prices/coiffure.json"
        format: json
        fields:
          - label: "Sections"
            name: sections
            widget: list
            label_singular: "Section"
            fields:
              - label: "Titre de section (optionnel)"
                name: heading
                widget: string
                required: false
                hint: "Laisser vide si pas de sous-catégorie"
              - label: "Prestations"
                name: items
                widget: list
                label_singular: "Prestation"
                fields:
                  - { label: "Nom du service", name: label, widget: string }
                  - { label: "Prix", name: price, widget: string, hint: "Ex : 100 dhs" }
                  - { label: "À partir de", name: from, widget: boolean, default: false }

      - name: visage
        label: "Soin Visage"
        file: "src/content/prices/visage.json"
        format: json
        fields:
          - label: "Sections"
            name: sections
            widget: list
            label_singular: "Section"
            fields:
              - { label: "Titre de section (optionnel)", name: heading, widget: string, required: false }
              - label: "Prestations"
                name: items
                widget: list
                label_singular: "Prestation"
                fields:
                  - { label: "Nom du service", name: label, widget: string }
                  - { label: "Prix", name: price, widget: string, hint: "Ex : 100 dhs" }
                  - { label: "À partir de", name: from, widget: boolean, default: false }

      - name: cils
        label: "Les Cils"
        file: "src/content/prices/cils.json"
        format: json
        fields:
          - label: "Sections"
            name: sections
            widget: list
            label_singular: "Section"
            fields:
              - { label: "Titre de section (optionnel)", name: heading, widget: string, required: false }
              - label: "Prestations"
                name: items
                widget: list
                label_singular: "Prestation"
                fields:
                  - { label: "Nom du service", name: label, widget: string }
                  - { label: "Prix", name: price, widget: string, hint: "Ex : 100 dhs" }
                  - { label: "À partir de", name: from, widget: boolean, default: false }

      - name: epilation
        label: "Épilation"
        file: "src/content/prices/epilation.json"
        format: json
        fields:
          - label: "Sections"
            name: sections
            widget: list
            label_singular: "Section"
            fields:
              - { label: "Titre de section (optionnel)", name: heading, widget: string, required: false }
              - label: "Prestations"
                name: items
                widget: list
                label_singular: "Prestation"
                fields:
                  - { label: "Nom du service", name: label, widget: string }
                  - { label: "Prix", name: price, widget: string, hint: "Ex : 100 dhs" }
                  - { label: "À partir de", name: from, widget: boolean, default: false }

      - name: onglerie
        label: "Onglerie"
        file: "src/content/prices/onglerie.json"
        format: json
        fields:
          - label: "Sections"
            name: sections
            widget: list
            label_singular: "Section"
            fields:
              - { label: "Titre de section", name: heading, widget: string, required: false, hint: "Ex : Mains, Pieds, Extra" }
              - label: "Prestations"
                name: items
                widget: list
                label_singular: "Prestation"
                fields:
                  - { label: "Nom du service", name: label, widget: string }
                  - { label: "Prix", name: price, widget: string, hint: "Ex : 100 dhs" }
                  - { label: "À partir de", name: from, widget: boolean, default: false }

      - name: massages
        label: "Massages"
        file: "src/content/prices/massages.json"
        format: json
        fields:
          - label: "Sections"
            name: sections
            widget: list
            label_singular: "Section"
            fields:
              - { label: "Titre de section (optionnel)", name: heading, widget: string, required: false }
              - label: "Prestations"
                name: items
                widget: list
                label_singular: "Prestation"
                fields:
                  - { label: "Nom du service", name: label, widget: string }
                  - { label: "Prix", name: price, widget: string, hint: "Ex : 100 dhs" }
                  - { label: "À partir de", name: from, widget: boolean, default: false }

      - name: makeup
        label: "Makeup"
        file: "src/content/prices/makeup.json"
        format: json
        fields:
          - label: "Sections"
            name: sections
            widget: list
            label_singular: "Section"
            fields:
              - { label: "Titre de section", name: heading, widget: string, required: false, hint: "Ex : Makeup Permanent, Makeup" }
              - label: "Prestations"
                name: items
                widget: list
                label_singular: "Prestation"
                fields:
                  - { label: "Nom du service", name: label, widget: string }
                  - { label: "Prix", name: price, widget: string, hint: "Ex : 100 dhs" }
                  - { label: "À partir de", name: from, widget: boolean, default: false }

  # ══════════════════════════════════════════════════
  # INFORMATIONS SALON
  # ══════════════════════════════════════════════════
  - name: informations
    label: "Informations Salon"
    files:

      - name: contact
        label: "Contact & Horaires"
        file: "src/content/info.json"
        format: json
        fields:
          - label: "Téléphone (affiché)"
            name: phone
            widget: string
            hint: "Format affiché sur le site. Ex : +212 662-519668"

          - label: "Numéro WhatsApp"
            name: whatsapp
            widget: string
            hint: "Chiffres uniquement, sans + ni espaces. Ex : 212662519668"

          - label: "Email"
            name: email
            widget: string

          - label: "Adresse"
            name: address
            widget: list
            label_singular: "Ligne"
            hint: "Une ligne par entrée (rue, ville, pays)"
            field:
              label: Ligne
              name: line
              widget: string

          - label: "Horaires d'ouverture"
            name: hours
            widget: list
            label_singular: "Plage horaire"
            fields:
              - { label: "Jours", name: days, widget: string, hint: "Ex : Lun – Sam" }
              - { label: "Heures", name: time, widget: string, hint: "Ex : 9h00 – 20h00" }

          - label: "Réseaux sociaux"
            name: social
            widget: object
            fields:
              - { label: "Instagram (Miss Prestige)", name: instagram, widget: string }
              - { label: "Instagram (Tanguift)", name: instagram_tanguift, widget: string }
              - { label: "Facebook", name: facebook, widget: string }

  # ══════════════════════════════════════════════════
  # SECTION HERO
  # ══════════════════════════════════════════════════
  - name: hero
    label: "Section Hero"
    files:

      - name: hero
        label: "Textes Hero (français)"
        file: "src/content/hero.json"
        format: json
        fields:
          - label: "Surtitle (eyebrow)"
            name: eyebrow
            widget: string
            hint: "Texte fin au-dessus du titre. Ex : Essaouira, Maroc"
          - label: "Titre — ligne 1"
            name: title1
            widget: string
            hint: "Première partie du titre principal. Ex : L'Art de la"
          - label: "Titre — ligne 2 (doré)"
            name: title2
            widget: string
            hint: "Deuxième partie affichée en doré. Ex : Beauté Féminine"
          - label: "Sous-titre"
            name: subtitle
            widget: text
            hint: "Phrase descriptive sous le titre principal"

  # ══════════════════════════════════════════════════
  # GALERIE — TRANSFORMATIONS AVANT / APRÈS
  # ══════════════════════════════════════════════════
  - name: galerie
    label: "Galerie"
    files:

      - name: transformations
        label: "Transformations Avant / Après"
        file: "src/content/gallery.json"
        format: json
        fields:
          - label: "Transformations"
            name: transformations
            widget: list
            label_singular: "Transformation"
            fields:
              - label: "Type d'affichage"
                name: type
                widget: select
                options:
                  - { label: "Côte-à-côte AVANT / APRÈS", value: "split" }
                  - { label: "Image unique (avant→après)", value: "full" }
              - { label: "Nom du service", name: service, widget: string, hint: "Ex : Design Sourcils" }
              - { label: "Catégorie", name: category, widget: string, hint: "Ex : Coiffure, Beauté, Onglerie" }
              - label: "Image principale (type full)"
                name: image
                widget: image
                required: false
                hint: "Uniquement pour le type 'Image unique'"
              - label: "Image AVANT (type split)"
                name: avant
                widget: image
                required: false
                hint: "Uniquement pour le type 'Côte-à-côte'"
              - label: "Image APRÈS (type split)"
                name: apres
                widget: image
                required: false
                hint: "Uniquement pour le type 'Côte-à-côte'"
